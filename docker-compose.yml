# ─────────────────────────────────────────────────────────────────────────────
# CricketIQ — Docker Compose (local full-stack development)
#
# Usage:
#   docker compose up --build
#
# Services:
#   backend   → FastAPI on http://localhost:8000
#   frontend  → Next.js on http://localhost:3000
#   db        → PostgreSQL 16 on localhost:5432  (optional — for DB features)
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cricketiq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cricketiq
      POSTGRES_PASSWORD: cricketiq
      POSTGRES_DB: cricketiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricketiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cricketiq_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cricketiq:cricketiq@db:5432/cricketiq
      DATABASE_URL_SYNC: postgresql://cricketiq:cricketiq@db:5432/cricketiq
      DATA_PATH: data/processed
      CORS_ORIGINS: http://localhost:3000
      PORT: "8000"
      WORKERS: "2"
      LOG_LEVEL: info
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      # Mount processed parquets so the API reads them without rebuilding
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    container_name: cricketiq_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
